<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKA Digital SD Portal - Tema Merah Putih</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* CSS khusus untuk print kartu massal agar rapi */
        @media print {
            .print-card-container { display: block; width: 100%; }
            .print-card { 
                width: 48%; 
                display: inline-block; 
                vertical-align: top;
                margin-bottom: 20px;
                page-break-inside: avoid;
            }
            .print-card:nth-child(even) { margin-left: 2%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        /* ==========================================
           PASTE URL GOOGLE APPS SCRIPT ANDA DI SINI
           ========================================== */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxuQ2-sN8ZHuOpUWFMps33mif13TJkzKdOe0Pn997i2lccy9fmUP59V-psb8gqD-g5OXQ/exec";

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('loading'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [activeExam, setActiveExam] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');

            /* Database States */
            const [dbSiswa, setDbSiswa] = useState([]);
            const [dbSoal, setDbSoal] = useState([]);
            const [dbJadwal, setDbJadwal] = useState([]);
            const [dbHasil, setDbHasil] = useState([]);
            const [dbGuru, setDbGuru] = useState([]);

            /* App Configuration State */
            const [appConfig, setAppConfig] = useState(() => {
                const saved = localStorage.getItem('tka_app_config');
                return saved ? JSON.parse(saved) : { 
                    namaSekolah: 'SD NEGERI 1 MERAH PUTIH', 
                    namaUjian: 'Ujian Akhir Semester', 
                    logo: '',
                    loginBackground: ''
                };
            });

            useEffect(() => {
                localStorage.setItem('tka_app_config', JSON.stringify(appConfig));
            }, [appConfig]);

            useEffect(() => {
                if (GAS_URL && !GAS_URL.includes("PASTE_URL")) {
                    fetchAllData(GAS_URL);
                } else { 
                    setErrorMsg("URL Google Apps Script belum disetel di kode HTML!"); 
                    setView('error'); 
                }
            }, []);

            const fetchAllData = async (url) => {
                try {
                    const [resSiswa, resSoal, resJadwal, resHasil, resGuru] = await Promise.all([
                        fetch(`${url}?action=getData&sheet=DB_Siswa`).then(r => r.json()),
                        fetch(`${url}?action=getData&sheet=DB_Bank_Soal`).then(r => r.json()),
                        fetch(`${url}?action=getData&sheet=DB_Jadwal`).then(r => r.json()),
                        fetch(`${url}?action=getData&sheet=DB_Hasil`).then(r => r.json()),
                        fetch(`${url}?action=getData&sheet=DB_Guru`).then(r => r.json())
                    ]);

                    if (resSiswa.status === 'success') setDbSiswa(resSiswa.data);
                    if (resSoal.status === 'success') setDbSoal(resSoal.data);
                    if (resJadwal.status === 'success') setDbJadwal(resJadwal.data);
                    if (resHasil.status === 'success') setDbHasil(resHasil.data);
                    if (resGuru.status === 'success') setDbGuru(resGuru.data);

                    setView('login');
                } catch (err) {
                    setErrorMsg("Gagal terhubung ke Cloud. Pastikan internet aktif dan URL valid.");
                    setView('error');
                }
            };

            const handleLogin = (role, userData = null) => {
                setCurrentUser({ role, ...userData });
                setView(role === 'siswa' ? 'siswa' : 'admin'); 
            };

            const handleLogout = () => {
                if(window.confirm('Apakah Anda yakin ingin keluar?')) {
                    setCurrentUser(null); 
                    setView('login'); 
                    setActiveExam(null);
                }
            };

            const executeApiAction = async (action, payload) => {
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, payload }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                } catch (err) { 
                    console.error("API POST Error", err); 
                }
            };

            if (view === 'loading') return <LoadingScreen />;
            if (view === 'error') return <ErrorScreen msg={errorMsg} retry={() => {setView('loading'); fetchAllData(GAS_URL);}} />;

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                    {view === 'login' && (
                        <LoginScreen onLogin={handleLogin} dbSiswa={dbSiswa} dbGuru={dbGuru} appConfig={appConfig} />
                    )}
                    {view === 'admin' && (
                        <DashboardPortal user={currentUser} onLogout={handleLogout} data={{dbSiswa, dbSoal, dbJadwal, dbHasil, dbGuru}} refreshData={() => fetchAllData(GAS_URL)} apiCall={executeApiAction} setDbSoal={setDbSoal} setDbGuru={setDbGuru} setDbSiswa={setDbSiswa} setDbJadwal={setDbJadwal} appConfig={appConfig} setAppConfig={setAppConfig} />
                    )}
                    {view === 'siswa' && (
                        <StudentPortal user={currentUser} onLogout={handleLogout} dbJadwal={dbJadwal} dbHasil={dbHasil} appConfig={appConfig} onStartExam={(e) => {setActiveExam(e); setView('exam');}} />
                    )}
                    {view === 'exam' && (
                        <ExamEngine user={currentUser} examData={activeExam} dbSoal={dbSoal} appConfig={appConfig} onFinish={(hasil) => { alert("Menyimpan Jawaban..."); executeApiAction('saveHasil', hasil); setDbHasil(p => [...p, hasil]); setActiveExam(null); setView('siswa'); alert("Ujian Selesai! Skor: " + hasil.Skor); }} />
                    )}
                </div>
            );
        };

        /* --- COMPONENTS --- */
        const LoadingScreen = () => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center text-slate-600">
                <i className="fas fa-spinner fa-spin text-5xl text-red-600 mb-6"></i>
                <h2 className="text-xl font-bold">Menyinkronkan Database...</h2>
            </div>
        );
        
        const ErrorScreen = ({msg, retry}) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-4 border-red-500">
                    <i className="fas fa-server text-5xl text-red-500 mb-4 block"></i>
                    <h2 className="text-xl font-bold mb-2">Koneksi Gagal</h2>
                    <p className="text-slate-600 mb-6">{msg}</p>
                    <button onClick={retry} className="px-8 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">
                        Coba Lagi
                    </button>
                </div>
            </div>
        );

        const LoginScreen = ({ onLogin, dbSiswa, dbGuru, appConfig }) => {
            const [nisn, setNisn] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault(); 
                setError('');
                
                if (nisn === 'admin' && password === 'admin') {
                    return onLogin('admin', {Nama_Guru: 'Administrator'});
                }
                
                const guru = dbGuru.find(g => String(g.Username) === String(nisn) && String(g.Password) === String(password));
                if (guru) {
                    return onLogin('admin', { ...guru, role: 'guru' });
                }

                const siswa = dbSiswa.find(s => String(s.NISN) === String(nisn) && String(s.Password) === String(password));
                if (siswa) {
                    if(String(siswa.Status_Aktif).toLowerCase() === 'true') {
                        onLogin('siswa', siswa);
                    } else {
                        setError('Akun Siswa dinonaktifkan oleh Admin.');
                    }
                } else {
                    setError('Username/NISN atau Password salah.');
                }
            };

            const loginStyle = {
                backgroundColor: appConfig.loginBackground ? '#000' : undefined,
                backgroundImage: appConfig.loginBackground ? `url(${appConfig.loginBackground})` : 'linear-gradient(to bottom right, #dc2626, #7f1d1d)',
                backgroundSize: 'cover',
                backgroundPosition: 'center',
                backgroundRepeat: 'no-repeat'
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4 relative" style={loginStyle}>
                    {appConfig.loginBackground && (
                        <div className="absolute inset-0 bg-black/30 z-0"></div>
                    )}
                    
                    <div className="bg-white/30 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 border border-white/40">
                        <div className="flex flex-col items-center mb-6 text-center">
                            {appConfig.logo ? (
                                <img src={appConfig.logo} alt="Logo" className="h-20 mb-3 object-contain drop-shadow-md" />
                            ) : (
                                <div className="bg-white/60 p-4 rounded-full mb-3 text-red-700 text-3xl shadow-sm">
                                    <i className="fas fa-graduation-cap"></i>
                                </div>
                            )}
                            <h1 className="text-2xl font-black text-slate-900 drop-shadow-sm">{appConfig.namaUjian}</h1>
                            <p className="text-slate-900 text-sm font-bold mt-1 drop-shadow-sm">{appConfig.namaSekolah}</p>
                        </div>
                        
                        {error && (
                            <div className="bg-red-100/90 text-red-600 p-3 rounded-lg mb-4 text-sm font-medium border border-red-200 shadow-sm">
                                <i className="fas fa-exclamation-triangle mr-2"></i>{error}
                            </div>
                        )}
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold mb-1 text-slate-900 drop-shadow-sm">Username / NISN</label>
                                <input 
                                    type="text" 
                                    className="w-full px-4 py-2 border border-white/50 bg-white/70 focus:bg-white/95 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-slate-900 transition-colors placeholder-slate-600" 
                                    value={nisn} 
                                    onChange={(e) => setNisn(e.target.value)} 
                                    required 
                                    placeholder="Masukkan NISN atau Username"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-1 text-slate-900 drop-shadow-sm">Password</label>
                                <input 
                                    type="password" 
                                    className="w-full px-4 py-2 border border-white/50 bg-white/70 focus:bg-white/95 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-slate-900 transition-colors placeholder-slate-600" 
                                    value={password} 
                                    onChange={(e) => setPassword(e.target.value)} 
                                    required 
                                    placeholder="••••••••"
                                />
                            </div>
                            <button type="submit" className="w-full bg-red-600/90 hover:bg-red-700 text-white py-3 rounded-lg font-bold transition shadow-lg mt-2 backdrop-blur-sm border border-red-500/50">
                                Masuk Portal
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        /* --- DASHBOARD ADMIN & GURU --- */
        const DashboardPortal = ({ user, onLogout, data, refreshData, apiCall, setDbSoal, setDbGuru, setDbSiswa, setDbJadwal, appConfig, setAppConfig }) => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const { dbSiswa, dbSoal, dbJadwal, dbHasil, dbGuru } = data;
            
            // Penentuan Akses (Admin = Melihat Semua, Guru = Melihat Data Miliknya)
            const isAdmin = user.role === 'admin' && user.Nama_Guru === 'Administrator';

            let tabs = [
                { id: 'dashboard', label: 'Overview', icon: 'fa-columns' },
                { id: 'soal', label: 'Manajemen Soal', icon: 'fa-file-lines' },
                { id: 'siswa', label: 'Data Peserta', icon: 'fa-users' },
                { id: 'hasil', label: 'Hasil Ujian', icon: 'fa-chart-bar' },
                { id: 'analisis', label: 'Analisis Psikometri', icon: 'fa-brain' },
                { id: 'laporan', label: 'Berita Acara', icon: 'fa-file-signature' },
                { id: 'pengaturan', label: 'Pengaturan', icon: 'fa-cogs' } 
            ];
            
            if (isAdmin) {
                tabs.push({ id: 'guru', label: 'Manajemen Akun Guru', icon: 'fa-chalkboard-teacher' });
            }

            const validScores = dbHasil.filter(h => h.Skor !== undefined && !isNaN(h.Skor)).map(h => parseInt(h.Skor));
            const averageScore = validScores.length > 0 ? (validScores.reduce((a,b) => a+b, 0) / validScores.length).toFixed(1) : 0;
            
            // Filter Data Soal berdasarkan User
            const mySoalCount = isAdmin ? dbSoal.length : dbSoal.filter(s => s.Pembuat === user.Nama_Guru).length;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <div className="w-64 bg-red-900 text-white flex flex-col shrink-0 print:hidden">
                        <div className="p-5 border-b border-red-800">
                            <div className="flex items-center gap-3 mb-2">
                                {appConfig.logo ? (
                                    <img src={appConfig.logo} alt="Logo" className="h-8 w-8 object-contain bg-white rounded p-0.5" />
                                ) : (
                                    <div className="bg-red-700 p-2 rounded-lg border border-red-600"><i className="fas fa-chalkboard-teacher"></i></div>
                                )}
                                <span className="font-bold text-lg truncate">Portal Guru</span>
                            </div>
                            <div className="text-xs text-red-200 bg-red-950 px-2 py-1 rounded inline-block truncate max-w-full">
                                Login: {user.Nama_Guru}
                            </div>
                        </div>
                        <div className="flex-1 py-4 overflow-y-auto">
                            <ul className="space-y-1 px-3">
                                {tabs.map(tab => (
                                    <li key={tab.id}>
                                        <button 
                                            onClick={() => setActiveTab(tab.id)} 
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-colors ${activeTab === tab.id ? 'bg-red-700 text-white font-bold shadow-sm' : 'text-red-200 hover:bg-red-800 hover:text-white'}`}
                                        >
                                            <i className={`fas ${tab.icon} w-5`}></i> {tab.label}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="p-4 border-t border-red-800 space-y-2">
                            <button onClick={refreshData} className="flex items-center justify-center gap-2 bg-red-800 hover:bg-red-700 w-full py-2 rounded-lg text-sm text-white font-medium transition">
                                <i className="fas fa-sync-alt"></i> Sync Data
                            </button>
                            <button onClick={onLogout} className="flex items-center justify-center gap-2 text-red-300 hover:text-white hover:bg-red-800 w-full py-2 rounded-lg text-sm transition">
                                <i className="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 bg-slate-50 overflow-y-auto p-8">
                        {activeTab === 'dashboard' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6 text-slate-800">Dashboard Utama</h2>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                                    <StatCard title="Siswa Terdaftar" value={dbSiswa.length} icon="fa-users" color="bg-red-600" />
                                    <StatCard title={isAdmin ? "Bank Soal Keseluruhan" : "Soal Saya"} value={mySoalCount} icon="fa-file-alt" color="bg-slate-600" />
                                    <StatCard title="Data Hasil Ujian" value={dbHasil.length} icon="fa-check-circle" color="bg-red-500" />
                                    <StatCard title="Rata-Rata Nilai" value={averageScore} icon="fa-chart-line" color="bg-amber-500" />
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h3 className="font-bold text-lg mb-2 text-slate-800">Selamat Datang, {user.Nama_Guru}!</h3>
                                    <p className="text-sm text-slate-600">Gunakan menu di samping untuk mengelola soal, memantau hasil ujian, mencetak kartu, dan mengubah pengaturan aplikasi. Anda hanya dapat mengelola Bank Soal milik kelas Anda sendiri.</p>
                                </div>
                            </div>
                        )}
                        {activeTab === 'soal' && <ManajemenSoal dbSoal={dbSoal} setDbSoal={setDbSoal} user={user} isAdmin={isAdmin} apiCall={apiCall} />}
                        {activeTab === 'siswa' && <DataPeserta data={dbSiswa} setDbSiswa={setDbSiswa} apiCall={apiCall} appConfig={appConfig} />}
                        {activeTab === 'hasil' && <DataTable title="Hasil Evaluasi Ujian" data={dbHasil} />}
                        {activeTab === 'analisis' && <PsychometricAnalysis dbHasil={dbHasil} dbSoal={dbSoal} user={user} isAdmin={isAdmin} />}
                        {activeTab === 'laporan' && <LaporanBeritaAcara dbJadwal={dbJadwal} dbSiswa={dbSiswa} dbHasil={dbHasil} appConfig={appConfig} />}
                        {activeTab === 'guru' && isAdmin && <ManajemenGuru dbGuru={dbGuru} setDbGuru={setDbGuru} apiCall={apiCall} />}
                        {activeTab === 'pengaturan' && <PengaturanSistem appConfig={appConfig} setAppConfig={setAppConfig} dbJadwal={dbJadwal} setDbJadwal={setDbJadwal} dbSiswa={dbSiswa} apiCall={apiCall} />}
                    </div>
                </div>
            );
        };

        /* --- SUB KOMPONEN PENGATURAN SISTEM --- */
        const PengaturanSistem = ({ appConfig, setAppConfig, dbJadwal, setDbJadwal, dbSiswa, apiCall }) => {
            const [namaSekolah, setNamaSekolah] = useState(appConfig.namaSekolah);
            const [namaUjian, setNamaUjian] = useState(appConfig.namaUjian);
            const [logoBase64, setLogoBase64] = useState(appConfig.logo);
            const [loginBgBase64, setLoginBgBase64] = useState(appConfig.loginBackground || '');

            const [jadwalForm, setJadwalForm] = useState({ ID_Tes: '', Mapel: '', Kelas: '', Tanggal: '', Waktu: '', Durasi: 120, Token: '', Status: 'Aktif' });
            const [kelasCetak, setKelasCetak] = useState('');
            const [isPrintingMassal, setIsPrintingMassal] = useState(false);

            const handleSaveIdentitas = (e) => {
                e.preventDefault();
                setAppConfig({ ...appConfig, namaSekolah, namaUjian, logo: logoBase64, loginBackground: loginBgBase64 });
                alert("Identitas & Latar Belakang berhasil disimpan!");
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setLogoBase64(canvas.toDataURL('image/png', 0.8));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleBgUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1280; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                        setLoginBgBase64(compressedBase64);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleAddJadwal = (e) => {
                e.preventDefault();
                
                // Menggabungkan Mapel dengan Kelas, dan Tanggal dengan Waktu
                const finalMapel = `${jadwalForm.Mapel} - ${jadwalForm.Kelas}`;
                const finalWaktu = `${jadwalForm.Tanggal} ${jadwalForm.Waktu} WIB`;
                
                const newJadwal = { 
                    ID_Tes: jadwalForm.ID_Tes, 
                    Mapel: finalMapel, 
                    Waktu_Mulai: finalWaktu, 
                    Durasi: jadwalForm.Durasi, 
                    Token: jadwalForm.Token, 
                    Status: jadwalForm.Status 
                };
                
                setDbJadwal(prev => [...prev, newJadwal]);
                // Jika Anda sudah menambahkan fungsi addJadwal di Backend GAS, Anda bisa panggil:
                // apiCall('addJadwal', newJadwal);
                
                alert("Jadwal/Token baru berhasil dibuat untuk sesi ini.");
                setJadwalForm({ ID_Tes: '', Mapel: '', Kelas: '', Tanggal: '', Waktu: '', Durasi: 120, Token: '', Status: 'Aktif' });
            };

            const siswaKelas = dbSiswa.filter(s => s.Kelas === kelasCetak);
            const daftarKelasUnik = [...new Set(dbSiswa.map(s => s.Kelas))].sort();

            return (
                <div className="space-y-8">
                    {/* BAGIAN 1: Identitas */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print:hidden">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-school text-red-600 mr-2"></i>Identitas Sekolah & Tampilan</h3>
                        <form onSubmit={handleSaveIdentitas} className="space-y-4 max-w-2xl">
                            <div>
                                <label className="block text-sm font-bold mb-1">Nama Sekolah</label>
                                <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={namaSekolah} onChange={e=>setNamaSekolah(e.target.value)} placeholder="SD NEGERI 1 MERAH PUTIH" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-1">Judul / Nama Ujian</label>
                                <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={namaUjian} onChange={e=>setNamaUjian(e.target.value)} placeholder="Ujian Akhir Semester" />
                            </div>
                            <div className="grid md:grid-cols-2 gap-6 pt-2">
                                <div>
                                    <label className="block text-sm font-bold mb-1">Logo Sekolah (PNG/JPG)</label>
                                    <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
                                    {logoBase64 && <img src={logoBase64} alt="Logo" className="mt-3 h-16 object-contain rounded border p-1" />}
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-1">Gambar Background Login</label>
                                    <input type="file" accept="image/*" onChange={handleBgUpload} className="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
                                    {loginBgBase64 && <img src={loginBgBase64} alt="Bg Preview" className="mt-3 h-20 w-full object-cover rounded border p-1" />}
                                </div>
                            </div>
                            <button type="submit" className="bg-red-600 text-white font-bold px-6 py-3 rounded-lg hover:bg-red-700 w-full md:w-auto mt-2 shadow-md transition">Simpan Pengaturan</button>
                        </form>
                    </div>

                    {/* BAGIAN 2: Pengaturan Waktu & Token */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print:hidden">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-clock text-amber-500 mr-2"></i>Pengaturan Waktu Ujian & Token</h3>
                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <h4 className="font-bold text-sm text-slate-500 mb-3 uppercase">Buat Sesi Ujian Baru</h4>
                                <form onSubmit={handleAddJadwal} className="space-y-3">
                                    <div><label className="text-sm font-bold">ID Sesi</label><input required type="text" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.ID_Tes} onChange={e=>setJadwalForm({...jadwalForm, ID_Tes: e.target.value})} placeholder="Misal: SESI-01" /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-sm font-bold">Mata Pelajaran</label>
                                            <input required type="text" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.Mapel} onChange={e=>setJadwalForm({...jadwalForm, Mapel: e.target.value})} placeholder="Misal: Matematika" />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Kelas</label>
                                            <select required className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.Kelas} onChange={e=>setJadwalForm({...jadwalForm, Kelas: e.target.value})}>
                                                <option value="">-- Pilih Kelas --</option>
                                                {[1,2,3,4,5,6,7,8,9].map(num => <option key={num} value={`Kelas ${num}`}>Kelas {num}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-sm font-bold">Tanggal Ujian</label>
                                            <input required type="date" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.Tanggal} onChange={e=>setJadwalForm({...jadwalForm, Tanggal: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Waktu Mulai</label>
                                            <input required type="time" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.Waktu} onChange={e=>setJadwalForm({...jadwalForm, Waktu: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="text-sm font-bold">Durasi (Menit)</label><input required type="number" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" value={jadwalForm.Durasi} onChange={e=>setJadwalForm({...jadwalForm, Durasi: e.target.value})} /></div>
                                        <div><label className="text-sm font-bold">Token Khusus</label><input required type="text" className="w-full border p-2 rounded text-sm font-mono uppercase outline-none focus:border-amber-500" value={jadwalForm.Token} onChange={e=>setJadwalForm({...jadwalForm, Token: e.target.value.toUpperCase()})} placeholder="XYZ12" /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-amber-500 text-white font-bold py-3 rounded-lg hover:bg-amber-600 transition shadow-md">Simpan Sesi Ujian</button>
                                </form>
                            </div>
                            <div>
                                <h4 className="font-bold text-sm text-slate-500 mb-3 uppercase">Daftar Sesi Ujian Aktif</h4>
                                <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                    {dbJadwal.map((j, i) => (
                                        <div key={i} className="border p-3 rounded-lg bg-slate-50 relative">
                                            <div className="font-bold text-red-700">{j.Mapel}</div>
                                            <div className="text-xs text-slate-500 mb-1">{j.Waktu_Mulai} • {j.Durasi} Menit</div>
                                            <div className="text-sm bg-white border inline-block px-2 py-0.5 rounded font-mono font-bold text-slate-700">Token: {j.Token}</div>
                                        </div>
                                    ))}
                                    {dbJadwal.length === 0 && <p className="text-sm text-slate-400">Belum ada sesi ujian.</p>}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* BAGIAN 3: Cetak Kartu Massal */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print:hidden">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-print text-red-500 mr-2"></i>Cetak Kartu Ujian Massal Per Kelas</h3>
                        <div className="flex gap-4 items-end max-w-md">
                            <div className="flex-1">
                                <label className="block text-sm font-bold mb-1">Pilih Kelas</label>
                                <select className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={kelasCetak} onChange={(e) => setKelasCetak(e.target.value)}>
                                    <option value="">-- Pilih Kelas --</option>
                                    {daftarKelasUnik.map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>
                            <button 
                                disabled={!kelasCetak || siswaKelas.length === 0}
                                onClick={() => setIsPrintingMassal(true)} 
                                className="bg-red-600 text-white font-bold px-6 py-2.5 rounded-lg hover:bg-red-700 disabled:opacity-50 transition shadow-md"
                            >
                                <i className="fas fa-print mr-2"></i> Cetak Kartu
                            </button>
                        </div>
                        {kelasCetak && <p className="text-sm text-slate-500 mt-2">Ditemukan {siswaKelas.length} siswa di {kelasCetak}.</p>}
                    </div>

                    {/* RENDER LAYAR PRINT MASSAL KARTU */}
                    {isPrintingMassal && (
                        <div className="fixed inset-0 z-50 bg-white print:static overflow-y-auto">
                            <div className="p-4 bg-slate-800 text-white flex justify-between items-center print:hidden sticky top-0 z-10 shadow-md">
                                <div className="font-bold">Pratinjau Cetak Massal - {kelasCetak} ({siswaKelas.length} Kartu)</div>
                                <div className="flex gap-3">
                                    <button onClick={() => setIsPrintingMassal(false)} className="bg-slate-600 px-4 py-1.5 rounded hover:bg-slate-500 font-bold transition">Batal</button>
                                    <button onClick={() => window.print()} className="bg-red-600 px-4 py-1.5 rounded hover:bg-red-500 font-bold transition"><i className="fas fa-print mr-2"></i> Print Sekarang</button>
                                </div>
                            </div>
                            
                            <div className="p-4 md:p-8 print:p-0 print-card-container bg-slate-200 print:bg-white text-black min-h-screen">
                                {siswaKelas.map((siswa, idx) => (
                                    <div key={idx} className="print-card bg-white border-2 border-black rounded-xl p-4 m-2 shadow-lg print:shadow-none inline-block w-full md:w-[46%] align-top">
                                        <div className="text-center mb-4 border-b-2 border-black pb-2 flex flex-col items-center">
                                            {appConfig.logo ? <img src={appConfig.logo} className="h-10 mb-1" /> : <i className="fas fa-graduation-cap text-2xl"></i>}
                                            <h2 className="text-lg font-black uppercase tracking-widest leading-tight">{appConfig.namaUjian}</h2>
                                            <p className="text-xs font-bold uppercase">{appConfig.namaSekolah}</p>
                                        </div>
                                        
                                        <div className="flex gap-4 items-center">
                                            <div className="flex-1 space-y-2 text-xs">
                                                <div><span className="block text-[10px] uppercase font-bold text-slate-500 print:text-black">Nama Peserta</span> <span className="font-black text-sm">{siswa.Nama}</span></div>
                                                <div><span className="block text-[10px] uppercase font-bold text-slate-500 print:text-black">Username / NISN</span> <span className="font-mono font-bold text-sm">{siswa.NISN}</span></div>
                                                <div><span className="block text-[10px] uppercase font-bold text-slate-500 print:text-black">Password</span> <span className="font-mono font-bold border border-black px-1 rounded">{siswa.Password}</span></div>
                                                <div><span className="block text-[10px] uppercase font-bold text-slate-500 print:text-black">Kelas</span> <span className="font-bold">{siswa.Kelas} - Grup {siswa.Grup}</span></div>
                                            </div>
                                            <div className="w-24 h-24 shrink-0 border-2 border-black p-1 rounded">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=LOGIN:${siswa.NISN}-${siswa.Password}`} alt="QR Code" className="w-full h-full object-contain" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* --- SUB KOMPONEN MANAJEMEN SOAL --- */
        const ManajemenSoal = ({ dbSoal, setDbSoal, user, isAdmin, apiCall }) => {
            const [showModal, setShowModal] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const fileInputRef = useRef(null);
            const [searchTerm, setSearchTerm] = useState('');
            
            const [form, setForm] = useState({ 
                ID_Soal: '', Tipe_Soal: 'Pilihan Ganda', Topik: '', Pertanyaan: '', 
                Opsi_A: '', Opsi_B: '', Opsi_C: '', Opsi_D: '', 
                Kunci: 'A', Media_URL: '' 
            });

            // FILTER: Hanya tampilkan soal milik guru yang sedang login (kecuali Admin Super)
            const displayedSoal = isAdmin ? dbSoal : dbSoal.filter(s => s.Pembuat === user.Nama_Guru);
            const filteredData = displayedSoal.filter(row => Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 2 * 1024 * 1024) alert("Gambar Anda lebih dari 2MB. Sistem akan otomatis mengompres ukurannya.");

                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                        setForm({...form, Media_URL: compressedBase64});
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleSubmitManual = (e) => {
                e.preventDefault();
                // Otomatis tandai soal dengan nama guru yang sedang login
                const newSoal = { ...form, Pembuat: user.Nama_Guru };
                
                if (isEditing) {
                    setDbSoal(prev => prev.map(s => s.ID_Soal === form.ID_Soal ? newSoal : s));
                    apiCall('editSoal', newSoal); 
                    alert("Soal berhasil diperbarui!");
                } else {
                    setDbSoal(prev => [...prev, newSoal]);
                    apiCall('addSoal', newSoal); 
                    alert("Soal berhasil ditambahkan ke Bank Soal Anda!");
                }
                
                setShowModal(false);
                setIsEditing(false);
                setForm({ ID_Soal: '', Tipe_Soal: 'Pilihan Ganda', Topik: '', Pertanyaan: '', Opsi_A: '', Opsi_B: '', Opsi_C: '', Opsi_D: '', Kunci: 'A', Media_URL: '' });
            };

            const handleEditClick = (soal) => {
                setForm(soal);
                setIsEditing(true);
                setShowModal(true);
            };

            const handleAddNewClick = () => {
                setForm({ ID_Soal: '', Tipe_Soal: 'Pilihan Ganda', Topik: '', Pertanyaan: '', Opsi_A: '', Opsi_B: '', Opsi_C: '', Opsi_D: '', Kunci: 'A', Media_URL: '' });
                setIsEditing(false);
                setShowModal(true);
            };

            const handleTypeChange = (e) => {
                const type = e.target.value;
                setForm({
                    ...form,
                    Tipe_Soal: type,
                    Opsi_A: type === 'Benar/Salah' ? 'Benar' : '',
                    Opsi_B: type === 'Benar/Salah' ? 'Salah' : '',
                    Opsi_C: '', Opsi_D: '',
                    Kunci: type === 'Benar/Salah' ? 'A' : (type === 'Mencocokkan' ? 'A:C,B:D' : 'A')
                });
            };

            const handleDownloadTemplate = () => {
                const header = "ID_Soal,Tipe_Soal,Topik,Pertanyaan,Opsi_A,Opsi_B,Opsi_C,Opsi_D,Kunci,Media_URL\n";
                const dummy = "MTK-01,Pilihan Ganda,Matematika Kelas 6,Berapa 10+5?,10,15,20,25,D,\n";
                const csvContent = "data:text/csv;charset=utf-8," + encodeURI(header + dummy);
                const link = document.createElement("a");
                link.setAttribute("href", csvContent);
                link.setAttribute("download", "Template_Import_Soal_SD.csv");
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim() !== '');
                    if (2 > rows.length) return alert("File kosong atau hanya berisi header.");
                    
                    let importCount = 0;
                    for (let i = 1; rows.length > i; i++) {
                        const rowData = rows[i].split(',');
                        if (9 > rowData.length) continue; 
                        
                        const newSoal = {
                            ID_Soal: rowData[0] || `IMP-${Date.now()}-${i}`,
                            Tipe_Soal: rowData[1] || 'Pilihan Ganda',
                            Topik: rowData[2] || 'Impor Masal',
                            Pertanyaan: rowData[3],
                            Opsi_A: rowData[4],
                            Opsi_B: rowData[5],
                            Opsi_C: rowData[6],
                            Opsi_D: rowData[7],
                            Kunci: rowData[8].toUpperCase().trim(),
                            Media_URL: rowData[9] || '',
                            Pembuat: user.Nama_Guru // Otomatis tag dengan nama guru login
                        };
                        setDbSoal(prev => [...prev, newSoal]);
                        apiCall('addSoal', newSoal);
                        importCount++;
                    }
                    alert(`Berhasil mengimpor ${importCount} soal ke Bank Soal Anda.`);
                    setShowImport(false);
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 className="text-2xl font-bold text-slate-800">{isAdmin ? "Manajemen Bank Soal Keseluruhan" : "Manajemen Bank Soal (Kelas Anda)"}</h2>
                        <div className="flex gap-2">
                            <button onClick={() => setShowImport(true)} className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                                <i className="fas fa-file-import"></i> Import CSV
                            </button>
                            <button onClick={handleAddNewClick} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                                <i className="fas fa-plus"></i> Tambah Manual
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto print:hidden">
                        <div className="p-4 border-b">
                            <input type="text" placeholder="Cari ID Soal, Topik, atau Pertanyaan..." className="w-full md:w-64 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                        {displayedSoal.length === 0 ? (
                            <div className="p-6 text-center text-slate-500">Tidak ada data soal yang Anda buat. Silakan tambahkan.</div>
                        ) : (
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="p-4 border-b font-semibold">ID Soal</th>
                                        <th className="p-4 border-b font-semibold">Tipe</th>
                                        <th className="p-4 border-b font-semibold">Topik</th>
                                        <th className="p-4 border-b font-semibold">Kunci</th>
                                        <th className="p-4 border-b font-semibold text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map((soal, i) => (
                                        <tr key={i} className="hover:bg-slate-50 border-b">
                                            <td className="p-4 font-bold text-slate-800">{soal.ID_Soal}</td>
                                            <td className="p-4">{soal.Tipe_Soal}</td>
                                            <td className="p-4 truncate max-w-xs">{soal.Topik}</td>
                                            <td className="p-4 font-bold text-emerald-600">{soal.Kunci}</td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => handleEditClick(soal)} className="bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">
                                                    <i className="fas fa-edit"></i> Edit
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* MODAL TAMBAH/EDIT MANUAL */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 overflow-y-auto">
                            <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full p-6 mt-10">
                                <h3 className="text-xl font-bold mb-4 border-b pb-2">{isEditing ? 'Edit Soal' : 'Buat Soal Baru'}</h3>
                                <form onSubmit={handleSubmitManual} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold mb-1">ID Soal</label>
                                            <input type="text" required disabled={isEditing} className={`w-full border p-2 rounded focus:ring-2 focus:ring-red-500 ${isEditing ? 'bg-slate-100 text-slate-500' : ''}`} value={form.ID_Soal} onChange={(e) => setForm({...form, ID_Soal: e.target.value})} placeholder="Misal: IPA-01" />
                                            {isEditing && <span className="text-[10px] text-slate-400">ID Soal tidak dapat diubah</span>}
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold mb-1">Tipe Soal</label>
                                            <select className="w-full border p-2 rounded bg-slate-50 font-bold" value={form.Tipe_Soal} onChange={handleTypeChange}>
                                                <option value="Pilihan Ganda">Pilihan Ganda (A-D)</option>
                                                <option value="Benar/Salah">Benar atau Salah</option>
                                                <option value="Mencocokkan">Mencocokkan</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div><label className="block text-sm font-bold mb-1">Topik/Mapel</label><input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Topik} onChange={(e) => setForm({...form, Topik: e.target.value})} placeholder="Misal: IPA Kelas 5" /></div>
                                    
                                    <div className="p-3 bg-slate-50 border rounded-lg">
                                        <label className="block text-sm font-bold mb-1">Upload Gambar (Otomatis Kompres)</label>
                                        <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
                                        {form.Media_URL && <img src={form.Media_URL} className="mt-2 h-20 object-contain rounded border p-1 bg-white" />}
                                    </div>

                                    <div><label className="block text-sm font-bold mb-1">Pertanyaan / Instruksi</label><textarea required className="w-full border p-2 rounded h-20 focus:ring-2 focus:ring-red-500" value={form.Pertanyaan} onChange={(e) => setForm({...form, Pertanyaan: e.target.value})} placeholder="Ketik pertanyaan..."></textarea></div>
                                    
                                    {/* FORM CONDITIONAL BEDASARKAN TIPE SOAL */}
                                    {form.Tipe_Soal === 'Pilihan Ganda' && (
                                        <React.Fragment>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-sm font-bold mb-1">Opsi A</label><input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_A} onChange={(e) => setForm({...form, Opsi_A: e.target.value})} /></div>
                                                <div><label className="block text-sm font-bold mb-1">Opsi B</label><input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_B} onChange={(e) => setForm({...form, Opsi_B: e.target.value})} /></div>
                                                <div><label className="block text-sm font-bold mb-1">Opsi C</label><input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_C} onChange={(e) => setForm({...form, Opsi_C: e.target.value})} /></div>
                                                <div><label className="block text-sm font-bold mb-1">Opsi D</label><input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_D} onChange={(e) => setForm({...form, Opsi_D: e.target.value})} /></div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-red-600">Kunci Jawaban Benar</label>
                                                <select className="w-full border p-2 rounded bg-red-50 font-bold" value={form.Kunci} onChange={(e) => setForm({...form, Kunci: e.target.value})}>
                                                    <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                                                </select>
                                            </div>
                                        </React.Fragment>
                                    )}

                                    {form.Tipe_Soal === 'Benar/Salah' && (
                                        <React.Fragment>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-sm font-bold mb-1 text-slate-400">Opsi A (Tetap)</label><input type="text" disabled className="w-full border p-2 rounded bg-slate-100" value="Benar" /></div>
                                                <div><label className="block text-sm font-bold mb-1 text-slate-400">Opsi B (Tetap)</label><input type="text" disabled className="w-full border p-2 rounded bg-slate-100" value="Salah" /></div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-red-600">Kunci Jawaban Benar</label>
                                                <select className="w-full border p-2 rounded bg-red-50 font-bold" value={form.Kunci} onChange={(e) => setForm({...form, Kunci: e.target.value})}>
                                                    <option value="A">A (Benar)</option><option value="B">B (Salah)</option>
                                                </select>
                                            </div>
                                        </React.Fragment>
                                    )}

                                    {form.Tipe_Soal === 'Mencocokkan' && (
                                        <React.Fragment>
                                            <div className="bg-red-50 p-3 rounded text-sm text-red-700 mb-2 font-medium">Sistem: Peserta harus mencocokkan Premis (Kiri) dengan Jawaban Pasangan (Kanan).</div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-2">
                                                    <label className="block text-sm font-bold mb-1">Daftar Premis (Kiri)</label>
                                                    <input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_A} onChange={(e) => setForm({...form, Opsi_A: e.target.value})} placeholder="Premis 1..." />
                                                    <input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_B} onChange={(e) => setForm({...form, Opsi_B: e.target.value})} placeholder="Premis 2..." />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="block text-sm font-bold mb-1">Jawaban Pasangan (Kanan)</label>
                                                    <input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_C} onChange={(e) => setForm({...form, Opsi_C: e.target.value})} placeholder="Jawaban untuk Premis 1" />
                                                    <input type="text" required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Opsi_D} onChange={(e) => setForm({...form, Opsi_D: e.target.value})} placeholder="Jawaban untuk Premis 2" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-red-600">Kunci Jawaban</label>
                                                <input type="text" disabled className="w-full border p-2 rounded bg-red-50 font-bold text-red-700" value="Premis 1 = Jawaban 1, Premis 2 = Jawaban 2" />
                                                <p className="text-xs text-slate-500 mt-1">Sistem akan mengacak pasangan secara otomatis saat ujian berlangsung.</p>
                                            </div>
                                        </React.Fragment>
                                    )}

                                    <div className="flex gap-3 pt-4 border-t">
                                        <button type="button" onClick={()=>setShowModal(false)} className="flex-1 px-4 py-2 bg-slate-200 rounded font-bold hover:bg-slate-300">Batal</button>
                                        <button type="submit" className="flex-1 px-4 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700">{isEditing ? 'Perbarui Soal' : 'Simpan Soal'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL IMPORT CSV */}
                    {showImport && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 text-center">
                                <i className="fas fa-file-csv text-5xl text-amber-500 mb-4"></i>
                                <h3 className="text-xl font-bold mb-2">Import Soal Massal (CSV)</h3>
                                <p className="text-sm text-slate-500 mb-6">Pastikan Anda mengisi data sesuai urutan kolom pada Template yang disediakan.</p>
                                
                                <button onClick={handleDownloadTemplate} className="w-full bg-slate-100 text-slate-700 py-2 rounded font-bold mb-4 border border-slate-300 hover:bg-slate-200">
                                    <i className="fas fa-download mr-2"></i> Download Template CSV
                                </button>
                                <input type="file" accept=".csv" ref={fileInputRef} className="hidden" onChange={handleImportCSV} />
                                <button onClick={() => fileInputRef.current.click()} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold mb-4 hover:bg-red-700 shadow-lg">
                                    <i className="fas fa-upload mr-2"></i> Pilih File CSV
                                </button>
                                <button onClick={()=>setShowImport(false)} className="w-full text-slate-400 text-sm font-bold mt-2 hover:text-slate-600">Batal</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* --- SUB KOMPONEN MANAJEMEN GURU --- */
        const ManajemenGuru = ({ dbGuru, setDbGuru, apiCall }) => {
            const [form, setForm] = useState({ Username: '', Nama_Guru: '', Password: '' });
            
            const handleSubmit = (e) => {
                e.preventDefault();
                setDbGuru(prev => [...prev, form]);
                apiCall('addGuru', form);
                alert("Akun Guru berhasil ditambahkan!");
                setForm({ Username: '', Nama_Guru: '', Password: '' });
            };

            return (
                <div className="grid md:grid-cols-3 gap-6">
                    <div className="md:col-span-2">
                        <DataTable title="Daftar Akun Guru Kelas" data={dbGuru} exportName="Akun_Guru" />
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 self-start">
                        <h3 className="font-bold text-lg mb-4 border-b pb-2">Tambah Guru Baru</h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="text-sm font-bold block mb-1">Username Login</label>
                                <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Username} onChange={(e) => setForm({...form, Username: e.target.value})} placeholder="guru_kelas6" />
                            </div>
                            <div>
                                <label className="text-sm font-bold block mb-1">Nama Lengkap & Title</label>
                                <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Nama_Guru} onChange={(e) => setForm({...form, Nama_Guru: e.target.value})} placeholder="Bpk. Andi (Wali Kelas 6)" />
                            </div>
                            <div>
                                <label className="text-sm font-bold block mb-1">Password</label>
                                <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={form.Password} onChange={(e) => setForm({...form, Password: e.target.value})} placeholder="pass123"/>
                            </div>
                            <button type="submit" className="w-full bg-red-600 text-white font-bold py-2 rounded hover:bg-red-700 transition">
                                Simpan Akun
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        /* --- DATA PESERTA (TAMBAH, EDIT, IMPORT/EXPORT & PRINT KARTU TUNGGAL) --- */
        const DataPeserta = ({ data, setDbSiswa, apiCall, appConfig }) => {
            const [cetakSiswa, setCetakSiswa] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const fileSiswaRef = useRef(null);

            const [formSiswa, setFormSiswa] = useState({
                NISN: '', Nama: '', Kelas: '', Grup: 'A', Password: '', Status_Aktif: 'TRUE'
            });

            const filteredData = data.filter(row => Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));
            
            const handlePrint = () => window.print();

            const handleExportCSV = () => {
                if (filteredData.length === 0) return alert("Tidak ada data untuk diekspor");
                const headers = Object.keys(filteredData[0]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...filteredData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(","))].join("\n");
                const link = document.createElement("a"); 
                link.setAttribute("href", encodeURI(csvContent)); 
                link.setAttribute("download", `Export_Data_Siswa.csv`); 
                link.click();
            };

            const handleSubmitManual = (e) => {
                e.preventDefault();
                
                if (isEditing) {
                    setDbSiswa(prev => prev.map(s => s.NISN === formSiswa.NISN ? formSiswa : s));
                    apiCall('editSiswa', formSiswa);
                    alert("Data siswa berhasil diperbarui!");
                } else {
                    setDbSiswa(prev => [...prev, formSiswa]);
                    apiCall('addSiswa', formSiswa);
                    alert("Data siswa berhasil ditambahkan!");
                }
                
                setShowAddModal(false);
                setIsEditing(false);
                setFormSiswa({ NISN: '', Nama: '', Kelas: '', Grup: 'A', Password: '', Status_Aktif: 'TRUE' });
            };

            const handleEditClick = (siswa) => {
                setFormSiswa(siswa);
                setIsEditing(true);
                setShowAddModal(true);
            };

            const handleAddNewClick = () => {
                setFormSiswa({ NISN: '', Nama: '', Kelas: '', Grup: 'A', Password: '', Status_Aktif: 'TRUE' });
                setIsEditing(false);
                setShowAddModal(true);
            };

            const handleDownloadTemplateSiswa = () => {
                const header = "NISN,Nama,Kelas,Grup,Password,Status_Aktif\n";
                const dummy = "112233,Ahmad Yusuf,Kelas 6,A,pass1122,TRUE\n";
                const csvContent = "data:text/csv;charset=utf-8," + encodeURI(header + dummy);
                const link = document.createElement("a");
                link.setAttribute("href", csvContent);
                link.setAttribute("download", "Template_Import_Siswa_SD.csv");
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleImportCSVSiswa = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim() !== '');
                    if (2 > rows.length) return alert("File kosong atau hanya berisi header.");
                    
                    let importCount = 0;
                    for (let i = 1; rows.length > i; i++) {
                        const rowData = rows[i].split(',');
                        if (6 > rowData.length) continue; 
                        
                        const newSiswa = {
                            NISN: rowData[0].trim(),
                            Nama: rowData[1].trim(),
                            Kelas: rowData[2].trim(),
                            Grup: rowData[3].trim(),
                            Password: rowData[4].trim(),
                            Status_Aktif: rowData[5].trim().toUpperCase()
                        };
                        setDbSiswa(prev => [...prev, newSiswa]);
                        apiCall('addSiswa', newSiswa);
                        importCount++;
                    }
                    alert(`Berhasil mengimpor ${importCount} siswa. Harap Sync Data ulang untuk konfirmasi.`);
                    setShowImportModal(false);
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <div className="flex flex-col lg:flex-row lg:justify-between lg:items-center mb-6 gap-4 print:hidden">
                        <h2 className="text-2xl font-bold text-slate-800">Manajemen Peserta Ujian</h2>
                        <div className="flex flex-wrap gap-2">
                            <div className="relative w-full md:w-auto">
                                <i className="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Cari NISN, Nama..." 
                                    className="w-full md:w-56 pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm" 
                                    value={searchTerm} 
                                    onChange={(e) => setSearchTerm(e.target.value)} 
                                />
                            </div>
                            <button onClick={handleExportCSV} className="bg-slate-800 hover:bg-slate-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                                <i className="fas fa-download"></i> Export
                            </button>
                            <button onClick={() => setShowImportModal(true)} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                                <i className="fas fa-upload"></i> Import
                            </button>
                            <button onClick={handleAddNewClick} className="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                                <i className="fas fa-user-plus"></i> Tambah
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto print:hidden">
                        {data.length === 0 ? (
                            <div className="p-6 text-center text-slate-500">Tidak ada data peserta di Sheet.</div>
                        ) : (
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="p-4 border-b font-semibold">NISN</th>
                                        <th className="p-4 border-b font-semibold">Nama Siswa SD</th>
                                        <th className="p-4 border-b font-semibold">Kelas</th>
                                        <th className="p-4 border-b font-semibold">Status</th>
                                        <th className="p-4 border-b font-semibold text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map((siswa, i) => (
                                        <tr key={i} className="hover:bg-slate-50 border-b last:border-0">
                                            <td className="p-4 font-mono text-slate-600">{siswa.NISN}</td>
                                            <td className="p-4 font-bold text-slate-800">{siswa.Nama}</td>
                                            <td className="p-4">{siswa.Kelas}</td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded text-xs font-bold ${String(siswa.Status_Aktif).toLowerCase() === 'true' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                    {String(siswa.Status_Aktif).toLowerCase() === 'true' ? 'Aktif' : 'Nonaktif'}
                                                </span>
                                            </td>
                                            <td className="p-4 text-center">
                                                <div className="flex justify-center gap-2">
                                                    <button onClick={() => handleEditClick(siswa)} className="bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition" title="Edit Siswa">
                                                        <i className="fas fa-edit"></i> Edit
                                                    </button>
                                                    <button onClick={() => setCetakSiswa(siswa)} className="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition" title="Cetak Kartu">
                                                        <i className="fas fa-print"></i> Kartu
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* MODAL TAMBAH/EDIT PESERTA MANUAL */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
                                <h3 className="text-xl font-bold mb-4 border-b pb-2">{isEditing ? 'Edit Data Siswa' : 'Tambah Data Siswa'}</h3>
                                <form onSubmit={handleSubmitManual} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold mb-1">NISN / Username</label>
                                            <input required disabled={isEditing} type="text" className={`w-full border p-2 rounded focus:ring-2 focus:ring-red-500 ${isEditing ? 'bg-slate-100 text-slate-500' : ''}`} value={formSiswa.NISN} onChange={(e) => setFormSiswa({...formSiswa, NISN: e.target.value})} placeholder="Misal: 00123" />
                                            {isEditing && <span className="text-[10px] text-slate-400">NISN tidak dapat diubah</span>}
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold mb-1">Password</label>
                                            <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={formSiswa.Password} onChange={(e) => setFormSiswa({...formSiswa, Password: e.target.value})} placeholder="Default pass" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Nama Lengkap Siswa</label>
                                        <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={formSiswa.Nama} onChange={(e) => setFormSiswa({...formSiswa, Nama: e.target.value})} placeholder="Budi Santoso" />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold mb-1">Kelas</label>
