                                            <select required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={formSiswa.Kelas} onChange={(e) => setFormSiswa({...formSiswa, Kelas: e.target.value})}>
                                                <option value="">-- Pilih Kelas --</option>
                                                {[1,2,3,4,5,6,7,8,9].map(num => <option key={num} value={`Kelas ${num}`}>Kelas {num}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold mb-1">Grup Ujian</label>
                                            <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={formSiswa.Grup} onChange={(e) => setFormSiswa({...formSiswa, Grup: e.target.value})} placeholder="A/B/C" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Status Akun</label>
                                        <select className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500" value={formSiswa.Status_Aktif} onChange={(e) => setFormSiswa({...formSiswa, Status_Aktif: e.target.value})}>
                                            <option value="TRUE">Aktif</option>
                                            <option value="FALSE">Nonaktif</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-4 border-t">
                                        <button type="button" onClick={()=>setShowAddModal(false)} className="flex-1 px-4 py-2 bg-slate-200 rounded font-bold hover:bg-slate-300">Batal</button>
                                        <button type="submit" className="flex-1 px-4 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700">{isEditing ? 'Perbarui Data' : 'Simpan Data'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL IMPORT PESERTA */}
                    {showImportModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 text-center">
                                <i className="fas fa-users text-5xl text-amber-500 mb-4"></i>
                                <h3 className="text-xl font-bold mb-2">Import Data Siswa (CSV)</h3>
                                <p className="text-sm text-slate-500 mb-6">Pastikan format kolom sesuai dengan template (NISN, Nama, Kelas, Grup, Password, Status).</p>
                                
                                <button onClick={handleDownloadTemplateSiswa} className="w-full bg-slate-100 text-slate-700 py-2 rounded font-bold mb-4 border border-slate-300 hover:bg-slate-200">
                                    <i className="fas fa-download mr-2"></i> Download Template CSV
                                </button>
                                <input type="file" accept=".csv" ref={fileSiswaRef} className="hidden" onChange={handleImportCSVSiswa} />
                                <button onClick={() => fileSiswaRef.current.click()} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold mb-4 hover:bg-red-700 shadow-lg">
                                    <i className="fas fa-upload mr-2"></i> Upload File CSV
                                </button>
                                <button onClick={()=>setShowImportModal(false)} className="w-full text-slate-400 text-sm font-bold mt-2 hover:text-slate-600">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL CETAK KARTU TUNGGAL */}
                    {cetakSiswa && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 print:bg-white print:absolute print:inset-0 print:items-start">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full print:shadow-none print:border-2 print:border-black print:rounded-none">
                                <div className="text-center mb-6 border-b-2 border-black pb-4">
                                    {appConfig.logo ? <img src={appConfig.logo} className="h-12 mx-auto mb-2 object-contain" /> : <i className="fas fa-graduation-cap text-3xl text-slate-800 print:text-black"></i>}
                                    <h2 className="text-xl font-black uppercase tracking-widest print:text-black">{appConfig.namaUjian}</h2>
                                    <p className="text-xs font-bold text-slate-500 uppercase print:text-black">{appConfig.namaSekolah}</p>
                                </div>
                                <div className="flex gap-6 items-center mb-6">
                                    <div className="flex-1 space-y-4 text-sm print:text-black">
                                        <div>
                                            <span className="block text-xs uppercase font-bold text-red-700 print:text-slate-800">Nama</span> 
                                            <span className="font-black text-lg leading-tight block">{cetakSiswa.Nama}</span>
                                        </div>
                                        <div>
                                            <span className="block text-xs uppercase font-bold text-red-700 print:text-slate-800">NISN / Username</span> 
                                            <span className="font-mono font-bold text-base">{cetakSiswa.NISN}</span>
                                        </div>
                                        <div>
                                            <span className="block text-xs uppercase font-bold text-red-700 print:text-slate-800">Password Ujian</span> 
                                            <span className="font-mono font-bold bg-slate-100 px-2 py-1 rounded print:bg-white border print:border-black">{cetakSiswa.Password}</span>
                                        </div>
                                        <div>
                                            <span className="block text-xs uppercase font-bold text-red-700 print:text-slate-800">Kelas</span> 
                                            <span className="font-bold">{cetakSiswa.Kelas}</span>
                                        </div>
                                    </div>
                                    <div className="w-28 h-28 shrink-0 border-2 p-1 rounded-lg print:border-black">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=LOGIN:${cetakSiswa.NISN}-${cetakSiswa.Password}`} alt="QR Code" className="w-full h-full object-contain" />
                                    </div>
                                </div>
                                <div className="mt-8 flex gap-3 print:hidden">
                                    <button onClick={() => setCetakSiswa(null)} className="flex-1 bg-slate-200 py-2 rounded-lg font-bold hover:bg-slate-300">Tutup</button>
                                    <button onClick={handlePrint} className="flex-1 bg-red-600 text-white py-2 rounded-lg font-bold hover:bg-red-700">
                                        <i className="fas fa-print"></i> Print
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* --- LAPORAN & BERITA ACARA --- */
        const LaporanBeritaAcara = ({ dbJadwal, dbSiswa, dbHasil, appConfig }) => {
            const [selectedTes, setSelectedTes] = useState('');
            const [isPrinting, setIsPrinting] = useState(false);

            if (dbJadwal.length === 0) return <div className="p-6 bg-white rounded-xl border text-slate-500">Belum ada jadwal.</div>;
            
            const jadwalAktif = dbJadwal.find(j => j.ID_Tes === selectedTes);
            
            let daftarHadir = jadwalAktif ? dbSiswa.map(siswa => {
                const hasilSiswa = dbHasil.find(h => String(h.NISN) === String(siswa.NISN) && h.Mapel === jadwalAktif.Mapel);
                return { 
                    ...siswa, 
                    hadir: !!hasilSiswa, 
                    skor: hasilSiswa ? hasilSiswa.Skor : '-', 
                    timestamp: hasilSiswa ? hasilSiswa.Timestamp : '-' 
                };
            }) : [];

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 print:hidden">Laporan & Berita Acara</h2>
                    <div className="bg-white p-6 rounded-xl shadow-sm border mb-6 print:hidden">
                        <select 
                            className="w-full max-w-md px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" 
                            value={selectedTes} 
                            onChange={(e) => setSelectedTes(e.target.value)}
                        >
                            <option value="">-- Pilih Ujian Dicetak --</option>
                            {dbJadwal.map(j => <option key={j.ID_Tes} value={j.ID_Tes}>{j.Mapel} - {j.Waktu_Mulai}</option>)}
                        </select>
                        {jadwalAktif && (
                            <button onClick={() => setIsPrinting(true)} className="mt-4 bg-red-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-red-700">
                                <i className="fas fa-print mr-2"></i> Preview Cetak
                            </button>
                        )}
                    </div>

                    {isPrinting && jadwalAktif && (
                        <div className="fixed inset-0 z-50 overflow-y-auto bg-black/60 print:bg-white print:absolute">
                            <div className="min-h-screen flex justify-center p-6 print:p-0">
                                <div className="bg-white p-10 rounded-xl max-w-4xl w-full print:shadow-none print:w-full print:p-0">
                                    
                                    {/* KOP SURAT DINAMIS */}
                                    <div className="border-b-4 border-double border-black pb-4 mb-6 flex items-center gap-6">
                                        {appConfig.logo ? (
                                            <img src={appConfig.logo} alt="Logo Sekolah" className="h-20 object-contain print:block" />
                                        ) : (
                                            <div className="h-20 w-20 bg-slate-100 flex items-center justify-center border border-black print:block"><span className="text-xs">Logo</span></div>
                                        )}
                                        <div className="flex-1 text-center pr-20">
                                            <h1 className="text-2xl font-black uppercase print:text-black">{appConfig.namaSekolah}</h1>
                                            <p className="text-sm font-bold uppercase print:text-black">{appConfig.namaUjian}</p>
                                            <p className="text-xs font-medium print:text-black">Laporan Resmi Evaluasi & Pelaksanaan Ujian</p>
                                        </div>
                                    </div>

                                    <h2 className="text-xl font-bold text-center underline uppercase mb-6 print:text-black">Berita Acara Pelaksanaan Ujian</h2>

                                    <div className="text-sm space-y-2 mb-8 print:text-black">
                                        <p>Pada hari ini, telah dilaksanakan evaluasi akademik secara digital untuk sesi ujian berikut:</p>
                                        <table className="mt-4 ml-4">
                                            <tbody>
                                                <tr><td className="w-40 font-bold">Mata Pelajaran / Kelas</td><td>: {jadwalAktif.Mapel}</td></tr>
                                                <tr><td className="font-bold">Waktu Mulai</td><td>: {jadwalAktif.Waktu_Mulai}</td></tr>
                                                <tr><td className="font-bold">Durasi Ujian</td><td>: {jadwalAktif.Durasi} Menit</td></tr>
                                                <tr><td className="font-bold">Total Terdaftar</td><td>: {daftarHadir.length} Siswa</td></tr>
                                                <tr><td className="font-bold">Hadir Ujian</td><td>: {daftarHadir.filter(s => s.hadir).length} Siswa</td></tr>
                                                <tr><td className="font-bold">Tidak Hadir</td><td>: {daftarHadir.filter(s => !s.hadir).length} Siswa</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    <table className="w-full text-sm border-collapse border border-black mb-10 print:text-black">
                                        <thead>
                                            <tr>
                                                <th className="border border-black p-2 bg-slate-100 print:bg-white text-center w-12">No</th>
                                                <th className="border border-black p-2 bg-slate-100 print:bg-white">NISN</th>
                                                <th className="border border-black p-2 bg-slate-100 print:bg-white">Nama Siswa</th>
                                                <th className="border border-black p-2 bg-slate-100 print:bg-white text-center">Kelas</th>
                                                <th className="border border-black p-2 bg-slate-100 print:bg-white text-center">Kehadiran</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {daftarHadir.map((siswa, idx) => (
                                                <tr key={idx}>
                                                    <td className="border border-black p-2 text-center">{idx + 1}</td>
                                                    <td className="border border-black p-2 font-mono">{siswa.NISN}</td>
                                                    <td className="border border-black p-2">{siswa.Nama}</td>
                                                    <td className="border border-black p-2 text-center">{siswa.Kelas}</td>
                                                    <td className="border border-black p-2 text-center">
                                                        {siswa.hadir ? <span className="font-bold text-green-600">Hadir</span> : <span className="font-bold text-red-600">Absen</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div className="flex justify-end mt-12 print:text-black">
                                        <div className="text-center">
                                            <p className="mb-16">Pengawas / Guru Kelas,</p>
                                            <p className="font-bold underline">___________________________</p>
                                        </div>
                                    </div>
                                    <div className="mt-10 flex gap-4 print:hidden border-t pt-6">
                                        <button onClick={() => setIsPrinting(false)} className="px-6 py-2 bg-slate-200 rounded-lg font-bold hover:bg-slate-300">Tutup</button>
                                        <button onClick={()=>window.print()} className="flex-1 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">
                                            <i className="fas fa-print"></i> Cetak
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* --- PSIKOMETRI & DATA TABLE (A-D) --- */
        const PsychometricAnalysis = ({ dbHasil, dbSoal, user, isAdmin }) => {
            const displayedSoal = isAdmin ? dbSoal : dbSoal.filter(s => s.Pembuat === user.Nama_Guru);

            if (displayedSoal.length === 0) return <div className="p-6 bg-white rounded-xl border text-slate-500">Belum ada data soal untuk dianalisis.</div>;
            
            const stats = displayedSoal.map((soal) => {
                const originalIndex = dbSoal.findIndex(s => s.ID_Soal === soal.ID_Soal);
                let optionCounts = { A: 0, B: 0, C: 0, D: 0 }; 
                let totalAnswers = 0;
                
                dbHasil.forEach(hasil => {
                    try {
                        const jawabanUser = JSON.parse(hasil.Jawaban_User || '{}');
                        const ans = jawabanUser[originalIndex];
                        if (ans && optionCounts[ans] !== undefined) { 
                            optionCounts[ans]++; 
                            totalAnswers++; 
                        }
                    } catch (e) {}
                });
                
                const correctCount = optionCounts[soal.Kunci] || 0;
                const difficultyPercent = totalAnswers > 0 ? Math.round((correctCount / totalAnswers) * 100) : 0;
                let diffLabel = difficultyPercent > 70 ? 'Mudah' : 30 > difficultyPercent && totalAnswers > 0 ? 'Sulit' : 'Sedang';
                let diffColor = difficultyPercent > 70 ? 'bg-green-100 text-green-700' : 30 > difficultyPercent && totalAnswers > 0 ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
                
                return { 
                    id: soal.ID_Soal, 
                    pembuat: soal.Pembuat, 
                    kunci: soal.Kunci, 
                    totalAnswers, 
                    difficultyPercent, 
                    diffLabel, 
                    diffColor, 
                    optionCounts 
                };
            });

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Analisis Butir Soal (SD A-D)</h2>
                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100 text-slate-600">
                                <tr>
                                    <th className="p-4 border-b">ID Soal</th>
                                    <th className="p-4 border-b">Guru Pembuat</th>
                                    <th className="p-4 border-b">Tingkat Kesukaran</th>
                                    <th className="p-4 border-b text-center">Kunci</th>
                                    <th className="p-4 border-b">Pemilihan Opsi (A-B-C-D)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {stats.map((stat, i) => (
                                    <tr key={i} className="hover:bg-slate-50 border-b last:border-0">
                                        <td className="p-4 font-bold">{stat.id}</td>
                                        <td className="p-4 text-xs">{stat.pembuat}</td>
                                        <td className="p-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-20 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                    <div className="h-full bg-red-600" style={{ width: `${stat.difficultyPercent}%` }}></div>
                                                </div>
                                                <span className={`px-2 py-1 rounded-md text-xs font-bold ${stat.diffColor}`}>
                                                    {stat.difficultyPercent}% ({stat.diffLabel})
                                                </span>
                                            </div>
                                        </td>
                                        <td className="p-4 font-bold text-emerald-600 text-center">{stat.kunci}</td>
                                        <td className="p-4 flex gap-2 text-xs">
                                            {['A', 'B', 'C', 'D'].map(opt => (
                                                <div key={opt} className={`flex flex-col items-center min-w-[28px] ${opt === stat.kunci ? 'font-bold text-emerald-600' : 'text-slate-500'}`}>
                                                    <span className="mb-1">{opt}</span>
                                                    <span className={`w-full text-center rounded border py-0.5 ${opt === stat.kunci ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-100 border-slate-200'}`}>
                                                        {stat.optionCounts[opt]}
                                                    </span>
                                                </div>
                                            ))}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const DataTable = ({ title, data, exportName }) => {
            const [searchTerm, setSearchTerm] = useState('');
            
            if (data.length === 0) return <div className="p-6 bg-white rounded-xl border text-slate-500">Tidak ada data.</div>;
            
            const headers = Object.keys(data[0]);
            const filteredData = data.filter(row => 
                Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const handleExportCSV = () => {
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...filteredData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(","))].join("\n");
                const link = document.createElement("a"); 
                link.setAttribute("href", encodeURI(csvContent)); 
                link.setAttribute("download", `Export_${exportName || title}.csv`); 
                link.click();
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
                        <div className="flex w-full md:w-auto gap-2">
                            <input 
                                type="text" 
                                placeholder="Cari data..." 
                                className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 text-sm outline-none" 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)} 
                            />
                            <button onClick={handleExportCSV} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition">
                                <i className="fas fa-file-excel"></i> Export CSV
                            </button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100 text-slate-600">
                                <tr>
                                    {headers.map(h => <th key={h} className="p-4 border-b font-bold">{h.replace(/_/g, ' ')}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {filteredData.length > 0 ? filteredData.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50 border-b">
                                        {headers.map(h => <td key={h} className="p-4 max-w-[200px] truncate" title={row[h]}>{row[h]}</td>)}
                                    </tr>
                                )) : (
                                    <tr>
                                        <td colSpan={headers.length} className="p-6 text-center text-slate-500">Data tidak ditemukan.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, color }) => {
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <div className={`${color} text-white w-12 h-12 flex items-center justify-center rounded-xl text-xl`}>
                        <i className={`fas ${icon}`}></i>
                    </div>
                    <div>
                        <div className="text-slate-500 text-sm font-medium">{title}</div>
                        <div className="text-2xl font-bold text-slate-800">{value}</div>
                    </div>
                </div>
            );
        };

        // --- PORTAL SISWA ---
        const StudentPortal = ({ user, onLogout, dbJadwal, dbHasil, appConfig, onStartExam }) => {
            const [tokenInput, setTokenInput] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);

            const handleVerifyToken = () => {
                if (tokenInput === selectedExam.Token) {
                    onStartExam(selectedExam);
                } else { 
                    alert('Token Salah!');
                }
            };
            
            const riwayatPeserta = dbHasil.filter(h => String(h.NISN) === String(user.NISN));

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-10">
                        <h1 className="font-bold text-lg text-red-700 flex items-center">
                            {appConfig.logo ? <img src={appConfig.logo} className="h-8 mr-2 object-contain" /> : <i className="fas fa-book-open mr-2"></i>}
                            {appConfig.namaUjian}
                        </h1>
                        <div className="flex items-center gap-4">
                            <div className="text-sm text-right font-bold">
                                {user.Nama} 
                                <span className="block text-xs font-normal text-slate-500">Kelas: {user.Kelas}</span>
                            </div>
                            <button onClick={onLogout} className="text-slate-400 text-xl hover:text-red-700 transition" title="Logout">
                                <i className="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </header>
                    <main className="p-6 md:p-10 max-w-4xl mx-auto w-full">
                        <h2 className="text-2xl font-bold mb-6">Ujian Tersedia</h2>
                        <div className="grid md:grid-cols-2 gap-6 mb-10">
                            {dbJadwal.map((jadwal) => (
                                <div key={jadwal.ID_Tes} className="bg-white rounded-xl shadow-sm border p-6 flex flex-col hover:border-red-200 transition">
                                    <div className="flex justify-between items-start mb-2">
                                        <span className={`px-2 py-1 text-xs font-bold rounded ${String(jadwal.Status).toLowerCase() === 'aktif' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>
                                            {jadwal.Status}
                                        </span>
                                        <span className="text-slate-400 text-sm">
                                            <i className="far fa-clock"></i> {jadwal.Durasi} Menit
                                        </span>
                                    </div>
                                    <h3 className="font-bold text-lg text-slate-800">{jadwal.Mapel}</h3>
                                    <p className="text-sm text-slate-500 mb-4">{jadwal.Waktu_Mulai}</p>
                                    
                                    {String(jadwal.Status).toLowerCase() === 'aktif' ? (
                                        selectedExam?.ID_Tes === jadwal.ID_Tes ? (
                                            <div className="flex gap-2 mt-auto">
                                                <input 
                                                    type="text" 
                                                    className="flex-1 border border-red-300 px-2 rounded uppercase font-bold text-center tracking-widest outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500" 
                                                    value={tokenInput} 
                                                    onChange={(e) => setTokenInput(e.target.value.toUpperCase())} 
                                                    placeholder="TOKEN" 
                                                />
                                                <button onClick={handleVerifyToken} className="bg-red-600 text-white px-4 py-2 font-bold rounded hover:bg-red-700">Mulai</button>
                                            </div>
                                        ) : (
                                            <button onClick={()=>{setSelectedExam(jadwal); setTokenInput('');}} className="w-full bg-red-50 text-red-600 py-2 rounded font-bold mt-auto hover:bg-red-100 border border-red-100">Masuk Sesi</button>
                                        )
                                    ) : (
                                        <button disabled className="w-full bg-slate-100 text-slate-400 py-2 rounded font-bold mt-auto">Belum Mulai</button>
                                    )}
                                </div>
                            ))}
                        </div>
                        
                        <h2 className="text-2xl font-bold mb-6 border-t pt-8">Riwayat Nilai Anda</h2>
                        <div className="bg-white rounded-xl shadow-sm border overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="p-4 border-b">Tanggal Selesai</th>
                                        <th className="p-4 border-b">Mata Pelajaran</th>
                                        <th className="p-4 border-b text-center">Skor Akhir</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {riwayatPeserta.map((h, i) => (
                                        <tr key={i} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 text-slate-500">{h.Timestamp}</td>
                                            <td className="p-4 font-bold">{h.Mapel}</td>
                                            <td className="p-4 text-center font-bold text-lg text-red-600">{h.Skor}</td>
                                        </tr>
                                    ))}
                                    {riwayatPeserta.length === 0 && (
                                        <tr>
                                            <td colSpan="3" className="p-6 text-center text-slate-500">Belum ada ujian yang dikerjakan.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        };

        // --- EXAM ENGINE ---
        const ExamEngine = ({ user, examData, dbSoal, appConfig, onFinish }) => {
            const [currentNumber, setCurrentNumber] = useState(0);
            const [answers, setAnswers] = useState({});
            const [doubtful, setDoubtful] = useState({});
            const [timeLeft, setTimeLeft] = useState(parseInt(examData.Durasi) * 60 || 0);
            const [showSummary, setShowSummary] = useState(false);
            const soalList = dbSoal; 

            useEffect(() => {
                if (0 >= timeLeft && soalList.length > 0) doSubmit();
                const timer = setInterval(() => setTimeLeft(prev => prev > 0 ? prev - 1 : 0), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const doSubmit = () => {
                let benar = 0;
                soalList.forEach((s, i) => { 
                    if (answers[i] === s.Kunci) benar++; 
                });
                onFinish({ 
                    Timestamp: new Date().toLocaleString(), 
                    NISN: user.NISN, 
                    Mapel: examData.Mapel, 
                    Skor: Math.round((benar/soalList.length)*100)||0, 
                    Jawaban_User: JSON.stringify(answers), 
                    Analisis_Butir: `Benar ${benar}/${soalList.length}` 
                });
            };

            const confirmSubmitExam = () => {
                doSubmit();
            };

            const handleMatchChange = (opsiLabel, val) => {
                const currentAns = answers[currentNumber] ? answers[currentNumber].split(',') : [];
                let parsedMap = {};
                currentAns.forEach(pair => {
                    if(pair.includes(':')) {
                        const [k, v] = pair.split(':');
                        parsedMap[k] = v;
                    }
                });
                parsedMap[opsiLabel] = val;
                
                const newString = `A:${parsedMap.A || ''},B:${parsedMap.B || ''}`;
                setAnswers(prev => ({...prev, [currentNumber]: newString}));
            };

            if (soalList.length === 0) return <div className="p-10 text-center font-bold">Soal Kosong!</div>;
            
            const soalNow = soalList[currentNumber];
            const totalDijawab = Object.keys(answers).filter(k => {
                if(!answers[k]) return false;
                if(soalList[k].Tipe_Soal === 'Mencocokkan') return answers[k].includes('A:') && answers[k].includes('B:') && answers[k].length > 6;
                return true;
            }).length;
            const totalRagu = Object.keys(doubtful).filter(k => doubtful[k]).length;
            const totalBelum = soalList.length - totalDijawab;

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            return (
                <div className="h-screen flex flex-col bg-slate-100 select-none relative">
                    <header className="bg-red-600 text-white px-6 py-3 flex justify-between items-center shadow-md z-10 shrink-0">
                        <div className="font-bold text-lg flex items-center">
                            {appConfig.logo && <img src={appConfig.logo} className="h-8 mr-3 bg-white rounded p-0.5 hidden sm:block object-contain" />}
                            {examData.Mapel} 
                            <span className="font-normal text-sm ml-2 opacity-80">({user.Nama})</span>
                        </div>
                        <div className="flex gap-4 items-center">
                            <div className="flex items-center gap-2 bg-red-800 px-4 py-1.5 rounded-lg shadow-inner">
                                <span className="text-sm font-medium text-red-200 hidden md:inline">Waktu Tersisa:</span>
                                <div className="font-mono text-xl font-bold text-white flex items-center">
                                    <i className="far fa-clock text-amber-300 mr-2"></i>{formatTime(timeLeft)}
                                </div>
                            </div>
                            <button onClick={()=>setShowSummary(true)} className="bg-white text-red-600 hover:bg-slate-100 px-5 py-2 rounded font-bold shadow transition">
                                Selesai
                            </button>
                        </div>
                    </header>
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="bg-white rounded-xl shadow p-6 md:p-8 max-w-4xl mx-auto">
                                <div className="flex justify-between items-center border-b pb-3 mb-6">
                                    <h3 className="font-bold text-xl text-slate-800">Soal No. {currentNumber + 1}</h3>
                                    <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border">
                                        {soalNow.Tipe_Soal || 'Pilihan Ganda'}
                                    </span>
                                </div>
                                
                                {soalNow.Media_URL && (
                                    <div className="mb-6 flex justify-center bg-slate-50 p-4 rounded-xl border">
                                        <img src={soalNow.Media_URL} className="max-h-64 object-contain rounded" onError={(e)=>e.target.style.display='none'} />
                                    </div>
                                )}
                                
                                <p className="text-xl mb-8 leading-relaxed text-slate-800">{soalNow.Pertanyaan}</p>
                                
                                {/* TAMPILAN BERDASARKAN TIPE SOAL */}
                                {(!soalNow.Tipe_Soal || soalNow.Tipe_Soal === 'Pilihan Ganda') && (
                                    <div className="space-y-4">
                                        {['A', 'B', 'C', 'D'].map((opsi) => {
                                            if(!soalNow[`Opsi_${opsi}`]) return null;
                                            const isSelected = answers[currentNumber] === opsi;
                                            return (
                                                <label key={opsi} className={`flex items-start gap-4 p-5 border-2 rounded-xl cursor-pointer transition ${isSelected ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-red-200'}`}>
                                                    <input type="radio" className="hidden" checked={isSelected} onChange={() => setAnswers(prev => ({...prev, [currentNumber]: opsi}))} />
                                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${isSelected ? 'border-red-500 bg-red-600 text-white' : 'border-slate-300 font-bold text-slate-400'}`}>
                                                        {isSelected ? <div className="w-3 h-3 bg-white rounded-full"></div> : opsi}
                                                    </div>
                                                    <div className="flex-1 text-lg pt-1 text-slate-800">{soalNow[`Opsi_${opsi}`]}</div>
                                                </label>
                                            )
                                        })}
                                    </div>
                                )}

                                {soalNow.Tipe_Soal === 'Benar/Salah' && (
                                    <div className="grid grid-cols-2 gap-6">
                                        {['A', 'B'].map((opsi) => {
                                            const isSelected = answers[currentNumber] === opsi;
                                            const label = opsi === 'A' ? 'Benar' : 'Salah';
                                            const colorClass = opsi === 'A' ? 'emerald' : 'red';
                                            
                                            return (
                                                <label key={opsi} className={`flex flex-col items-center gap-4 p-6 border-2 rounded-xl cursor-pointer transition ${isSelected ? `border-${colorClass}-500 bg-${colorClass}-50` : 'border-slate-200 hover:border-slate-300'}`}>
                                                    <input type="radio" className="hidden" checked={isSelected} onChange={() => setAnswers(prev => ({...prev, [currentNumber]: opsi}))} />
                                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center ${isSelected ? `border-${colorClass}-500 bg-${colorClass}-500 text-white` : 'border-slate-300'}`}>
                                                        {isSelected && <i className="fas fa-check"></i>}
                                                    </div>
                                                    <div className={`text-2xl font-black ${isSelected ? `text-${colorClass}-600` : 'text-slate-600'}`}>{label}</div>
                                                </label>
                                            )
                                        })}
                                    </div>
                                )}

                                {soalNow.Tipe_Soal === 'Mencocokkan' && (
                                    <div className="space-y-6 bg-red-50/50 p-6 border border-red-100 rounded-xl">
                                        <p className="text-sm font-bold text-red-800 mb-4"><i className="fas fa-link mr-2"></i>Pasangkan premis di sebelah kiri dengan pilihan yang tepat.</p>
                                        
                                        {['A', 'B'].map(premisKey => {
                                            if(!soalNow[`Opsi_${premisKey}`]) return null;
                                            
                                            // Get current matching value
                                            const currentAns = answers[currentNumber] || '';
                                            let currentMatch = '';
                                            if(currentAns.includes(`${premisKey}:`)) {
                                                currentMatch = currentAns.split(`${premisKey}:`)[1].split(',')[0];
                                            }

                                            return (
                                                <div key={premisKey} className="flex flex-col md:flex-row items-center gap-4 bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                                                    <div className="flex-1 font-bold text-lg w-full text-center md:text-left">{soalNow[`Opsi_${premisKey}`]}</div>
                                                    <i className="fas fa-arrow-right text-slate-300 hidden md:block"></i>
                                                    <div className="w-full md:w-1/2 shrink-0">
                                                        <select 
                                                            className="w-full p-3 border-2 border-red-200 rounded-lg outline-none focus:border-red-500 font-medium"
                                                            value={currentMatch}
                                                            onChange={(e) => handleMatchChange(premisKey, e.target.value)}
                                                        >
                                                            <option value="">-- Pilih Pasangan --</option>
                                                            {soalNow.Opsi_C && <option value="C">{soalNow.Opsi_C}</option>}
                                                            {soalNow.Opsi_D && <option value="D">{soalNow.Opsi_D}</option>}
                                                        </select>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                                
                                <div className="flex justify-between items-center mt-10 border-t pt-6">
                                    <button disabled={currentNumber===0} onClick={()=>setCurrentNumber(p=>p-1)} className="px-6 py-3 bg-slate-200 rounded-lg font-bold text-slate-700 hover:bg-slate-300 disabled:opacity-50 transition">
                                        <i className="fas fa-arrow-left mr-2"></i>Prev
                                    </button>
                                    <label className="flex items-center gap-2 cursor-pointer select-none bg-yellow-50 px-4 py-2 rounded-lg border border-yellow-300 text-yellow-700 font-bold hover:bg-yellow-100 transition">
                                        <input type="checkbox" className="w-5 h-5 accent-yellow-500" checked={doubtful[currentNumber] || false} onChange={()=>setDoubtful(p=>({...p, [currentNumber]: !p[currentNumber]}))} />
                                        Ragu-Ragu
                                    </label>
                                    <button disabled={currentNumber===soalList.length-1} onClick={()=>setCurrentNumber(p=>p+1)} className="px-6 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 disabled:opacity-50 transition">
                                        Next<i className="fas fa-arrow-right ml-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div className="w-full md:w-80 bg-white border-l p-4 flex flex-col h-56 md:h-auto shrink-0">
                            <h3 className="font-bold text-center mb-4 border-b pb-2">Navigasi Soal</h3>
                            <div className="flex-1 overflow-y-auto pr-2">
                                <div className="grid grid-cols-5 gap-2">
                                    {soalList.map((s, i) => {
                                        let isAnswered = false;
                                        if (s.Tipe_Soal === 'Mencocokkan') {
                                            isAnswered = answers[i] && answers[i].includes('A:') && answers[i].includes('B:') && answers[i].length > 6;
                                        } else {
                                            isAnswered = answers[i] !== undefined && answers[i] !== '';
                                        }

                                        let btnClass = 'bg-slate-100 text-slate-500 hover:bg-slate-200 border-transparent';
                                        if (i === currentNumber) btnClass = 'ring-2 ring-red-600 bg-white text-red-600';
                                        else if (doubtful[i]) btnClass = 'bg-yellow-400 text-yellow-900 border-transparent shadow-sm';
                                        else if (isAnswered) btnClass = 'bg-red-600 text-white border-transparent shadow-sm';
                                        
                                        return (
                                            <button key={i} onClick={()=>setCurrentNumber(i)} className={`h-12 rounded font-bold border transition ${btnClass}`}>
                                                {i+1}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="mt-4 pt-4 border-t text-xs font-bold text-slate-500 grid grid-cols-2 gap-2">
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-red-600 rounded"></div>Terjawab</div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-yellow-400 rounded"></div>Ragu-Ragu</div>
                                <div className="flex items-center gap-2 col-span-2"><div className="w-3 h-3 bg-slate-100 border rounded"></div>Belum Dijawab</div>
                            </div>
                        </div>
                    </div>

                    {/* LAYAR KONFIRMASI (SUMMARY MODAL) */}
                    {showSummary && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full overflow-hidden">
                                <div className="bg-red-600 p-6 text-center text-white">
                                    <i className="fas fa-clipboard-check text-4xl mb-2"></i>
                                    <h2 className="text-xl font-bold">Konfirmasi Kumpul</h2>
                                </div>
                                <div className="p-6">
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-50 p-4 rounded-xl text-center border">
                                            <div className="text-2xl font-black text-slate-800">{soalList.length}</div>
                                            <div className="text-xs font-bold text-slate-500 uppercase mt-1">Total Soal</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-xl text-center border border-red-200">
                                            <div className="text-2xl font-black text-red-600">{totalDijawab}</div>
                                            <div className="text-xs font-bold text-red-600 uppercase mt-1">Terjawab</div>
                                        </div>
                                        <div className="bg-yellow-50 p-4 rounded-xl text-center border border-yellow-200">
                                            <div className="text-2xl font-black text-yellow-600">{totalRagu}</div>
                                            <div className="text-xs font-bold text-yellow-600 uppercase mt-1">Ragu-ragu</div>
                                        </div>
                                        <div className="bg-slate-100 p-4 rounded-xl text-center border border-slate-300">
                                            <div className="text-2xl font-black text-slate-600">{totalBelum}</div>
                                            <div className="text-xs font-bold text-slate-600 uppercase mt-1">Kosong</div>
                                        </div>
                                    </div>
                                    
                                    {(totalBelum > 0 || totalRagu > 0) && (
                                        <div className="bg-amber-50 text-amber-700 p-3 rounded-lg text-sm mb-6 font-medium border border-amber-200 flex items-start gap-2">
                                            <i className="fas fa-exclamation-triangle mt-1"></i>
                                            <div>Masih ada soal kosong atau ditandai ragu-ragu. Waktu Anda tersisa <strong>{formatTime(timeLeft)}</strong>.</div>
                                        </div>
                                    )}
                                    
                                    <div className="flex gap-3">
                                        <button onClick={()=>setShowSummary(false)} className="flex-1 bg-slate-200 py-3 rounded-xl font-bold hover:bg-slate-300 text-slate-800 transition">
                                            Kembali
                                        </button>
                                        <button onClick={confirmSubmitExam} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition">
                                            Kumpulkan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
